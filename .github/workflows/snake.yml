name: generate contribution snake 🐍

on:
  schedule:
    # runs twice a day so the snake stays fresh
    - cron: "0 */12 * * *"
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: generate snake svgs (light + dark)
        uses: Platane/snk@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            dist/github-snake.svg?palette=github-light&color_snake=FFB6D9&color_dots=FFEEF4,FFC9DE,FF8FAB,C8A2E8,9C5FB8
            dist/github-snake-dark.svg?palette=github-dark&color_snake=FF8FAB&color_dots=2A1A2E,5C3A6E,9C5FB8,C8A2E8,FFB6D9

      - name: push svgs to the output branch
        uses: crazy-max/ghaction-github-pages@v3.1.0
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
