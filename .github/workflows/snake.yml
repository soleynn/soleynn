name: generate contribution snake 🐍

on:
  schedule:
    # runs twice a day so the snake stays fresh
    - cron: "0 */12 * * *"
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: generate snake svgs (light + dark)
        uses: Platane/snk@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            dist/github-snake.svg?palette=github-light&color_snake=%23FF6FA5&color_dots=%23FFEEF4,%23FFC9DE,%23FF8FAB,%23C8A2E8,%239C5FB8
            dist/github-snake-dark.svg?palette=github-dark&color_snake=%23FF8FAB&color_dots=%23241A2E,%235C3A6E,%239C5FB8,%23C8A2E8,%23FFB6D9

      - name: push svgs to the output branch
        uses: crazy-max/ghaction-github-pages@v3.1.0
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
